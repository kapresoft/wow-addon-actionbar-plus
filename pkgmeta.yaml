package-as: ActionbarPlus
# --------------------------
license-output: LICENSE.txt
enable-nolib-creation: no

manual-changelog:
  filename: CHANGELOG.txt

embedded-libraries:
  - LibStub
  - Ace3
  - LibPrettyPrint
  - LibSharedMedia-3-0

tools-used:
  - DevSuite
  - DebugChatFrame
  - Addon-Usage
  - Bugsack
  - Bug-Grabber

optional-dependencies:
  - ActionbarPlus-Masque

# Resources:
#  - https://github.com/wowace-mirror
#  - https://www.wowace.com/projects/ace3
#  - SVN URLs are still the primary source recommendation
externals:
  ActionbarPlus-Core/ThirdParty/Libs/Ace3: https://github.com/WoWUIDev/Ace3
  ActionbarPlus-Core/ThirdParty/Libs/LibPrettyPrint: https://github.com/kapresoft/wow-addon-LibPrettyPrint
  ActionbarPlus-Core/ThirdParty/Libs/Kapresoft-LibUtil: https://github.com/kapresoft/wow-lib-util
  ActionbarPlus-Core/ThirdParty/Libs/LibSharedMedia/LibSharedMedia-3.0: https://repos.wowace.com/wow/libsharedmedia-3-0/trunk/LibSharedMedia-3.0

ignore:
  - "*.sh"
  - "*.md"
  - "*.yaml"
  - "*.yml"
  - "*.toml"
  - dev
  - doc
  - scripts
  - "ActionbarPlus/**"
  - ActionbarPlus-Core/Libs/Developer
  - ActionbarPlus-Core/ThirdParty/Libs/LibPrettyPrint/dev
  - ActionbarPlus-Core/ThirdParty/Libs/LibPrettyPrint/doc
  - ActionbarPlus-Core/ThirdParty/Libs/LibPrettyPrint/ThirdParty
  - ActionbarPlus-Core/ThirdParty/Libs/LibPrettyPrint/LibPrettyPrint.xml
  - ActionbarPlus-Core/ThirdParty/Libs/LibPrettyPrint/Libs/Developer/*.xml
  - ActionbarPlus-Core/ThirdParty/Libs/LibPrettyPrint/Libs/Developer/Developer*.lua
  - ActionbarPlus-Core/ThirdParty/Libs/LibPrettyPrint/*.toc
  - ActionbarPlus-Core/ThirdParty/Libs/Kapresoft-LibUtil/dev
  - ActionbarPlus-Core/ThirdParty/Libs/Kapresoft-LibUtil/External
  - ActionbarPlus-Core/ThirdParty/Libs/Kapresoft-LibUtil/Lib
  - ActionbarPlus-Core/ThirdParty/Libs/Kapresoft-LibUtil/_Lib.xml
  - ActionbarPlus-Core/ThirdParty/Libs/Kapresoft-LibUtil/*.toc

# REQUIRED for CurseForge packager (non-obvious):
# The LEFT side MUST be <repo-folder>/<addon-folder>
#   - <addon-folder> MUST be the folder that contains the .toc files
# The RIGHT side MUST be the addon name:
#   - Must match the .toc filename (AddonName.toc)
#   - Must match `package-as`
#
# NOTE:
# CurseForge release.sh (poorly) relies on `move-folders` for *addon discovery*,
# not just post-processing. If this does not exactly match
# <repo>/<addon>, `toc_root_paths` will be empty and packaging WILL fail.
#
# ⚠️ Do not change unless you also change the repo/addon layout.
move-folders:
  ActionbarPlus/ActionbarPlus-Core: ActionbarPlus-Core
  ActionbarPlus/ActionbarPlus-BarsUI: ActionbarPlus-BarsUI
  ActionbarPlus/ActionbarPlus-OptionsUI: ActionbarPlus-OptionsUI
